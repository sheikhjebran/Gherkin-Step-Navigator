<svg xmlns="http://www.w3.org/2000/svg" width="600" height="320" viewBox="0 0 600 320">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e1e"/>
      <stop offset="100%" style="stop-color:#252526"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.5"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="320" fill="url(#bg2)"/>
  
  <!-- Title bar -->
  <rect x="0" y="0" width="600" height="30" fill="#323233"/>
  <text x="300" y="20" fill="#cccccc" font-family="system-ui" font-size="12" text-anchor="middle">login.feature - Hover Information</text>
  
  <!-- Editor panel -->
  <rect x="10" y="40" width="580" height="270" fill="#1e1e1e" rx="4"/>
  
  <!-- Feature content -->
  <text x="20" y="65" fill="#569cd6" font-family="monospace" font-size="12">Feature:</text>
  <text x="85" y="65" fill="#ce9178" font-family="monospace" font-size="12">User Login</text>
  
  <text x="30" y="95" fill="#569cd6" font-family="monospace" font-size="12">Scenario:</text>
  <text x="105" y="95" fill="#ce9178" font-family="monospace" font-size="12">Valid login</text>
  
  <text x="40" y="125" fill="#c586c0" font-family="monospace" font-size="12">Given</text>
  <text x="85" y="125" fill="#d4d4d4" font-family="monospace" font-size="12">I am on the login page</text>
  
  <!-- Hovered step -->
  <rect x="35" y="135" width="300" height="22" fill="#2a2d2e" rx="2"/>
  <text x="40" y="152" fill="#c586c0" font-family="monospace" font-size="12">When</text>
  <text x="80" y="152" fill="#4ec9b0" font-family="monospace" font-size="12">I enter valid credentials</text>
  
  <!-- Hover tooltip -->
  <rect x="150" y="160" width="350" height="130" fill="#252526" rx="6" filter="url(#shadow)" stroke="#454545" stroke-width="1"/>
  
  <!-- Tooltip header -->
  <rect x="150" y="160" width="350" height="28" fill="#2d2d30" rx="6"/>
  <rect x="150" y="180" width="350" height="8" fill="#2d2d30"/>
  <text x="165" y="180" fill="#4ec9b0" font-family="monospace" font-size="11" font-weight="bold">Step Definition</text>
  
  <!-- Tooltip content -->
  <text x="165" y="205" fill="#9cdcfe" font-family="monospace" font-size="10">Pattern:</text>
  <text x="220" y="205" fill="#ce9178" font-family="monospace" font-size="10">@when('I enter valid credentials')</text>
  
  <text x="165" y="225" fill="#9cdcfe" font-family="monospace" font-size="10">Function:</text>
  <text x="225" y="225" fill="#dcdcaa" font-family="monospace" font-size="10">enter_valid_credentials()</text>
  
  <text x="165" y="245" fill="#9cdcfe" font-family="monospace" font-size="10">File:</text>
  <text x="195" y="245" fill="#4ec9b0" font-family="monospace" font-size="10">features/steps/login_steps.py:24</text>
  
  <text x="165" y="265" fill="#9cdcfe" font-family="monospace" font-size="10">Docstring:</text>
  <text x="230" y="265" fill="#6a9955" font-family="monospace" font-size="10" font-style="italic">Enter username and password</text>
  
  <!-- Cursor indicator -->
  <circle cx="145" cy="147" r="4" fill="#4ec9b0"/>
  
  <!-- More steps below -->
  <text x="40" y="300" fill="#c586c0" font-family="monospace" font-size="12">Then</text>
  <text x="80" y="300" fill="#d4d4d4" font-family="monospace" font-size="12">I should see the dashboard</text>
</svg>