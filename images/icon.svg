<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="cucumberGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50"/>
      <stop offset="100%" style="stop-color:#2E7D32"/>
    </linearGradient>
    <linearGradient id="arrowGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFC107"/>
      <stop offset="100%" style="stop-color:#FF9800"/>
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="#1E1E1E"/>
  <circle cx="64" cy="64" r="56" fill="#252526"/>
  
  <!-- Gherkin/Cucumber shape -->
  <ellipse cx="50" cy="64" rx="22" ry="38" fill="url(#cucumberGradient)" transform="rotate(-15 50 64)"/>
  
  <!-- Cucumber bumps/texture -->
  <circle cx="38" cy="48" r="4" fill="#66BB6A" opacity="0.6"/>
  <circle cx="45" cy="58" r="3.5" fill="#66BB6A" opacity="0.6"/>
  <circle cx="40" cy="70" r="4" fill="#66BB6A" opacity="0.6"/>
  <circle cx="48" cy="82" r="3" fill="#66BB6A" opacity="0.6"/>
  <circle cx="55" cy="45" r="3" fill="#66BB6A" opacity="0.6"/>
  <circle cx="58" cy="68" r="3.5" fill="#66BB6A" opacity="0.6"/>
  
  <!-- Navigation arrow pointing right -->
  <g transform="translate(70, 54)">
    <!-- Arrow body -->
    <rect x="0" y="6" width="28" height="8" rx="2" fill="url(#arrowGradient)"/>
    <!-- Arrow head -->
    <polygon points="24,0 40,10 24,20" fill="url(#arrowGradient)"/>
  </g>
  
  <!-- Step indicators (dots) -->
  <circle cx="95" cy="40" r="5" fill="#81C784"/>
  <circle cx="105" cy="50" r="4" fill="#A5D6A7"/>
  <circle cx="100" cy="85" r="5" fill="#81C784"/>
  <circle cx="110" cy="75" r="4" fill="#A5D6A7"/>
  
  <!-- Code brackets hint -->
  <text x="18" y="105" font-family="monospace" font-size="18" fill="#569CD6" font-weight="bold">{</text>
  <text x="100" y="105" font-family="monospace" font-size="18" fill="#569CD6" font-weight="bold">}</text>
</svg>
