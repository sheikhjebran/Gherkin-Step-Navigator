<svg xmlns="http://www.w3.org/2000/svg" width="600" height="300" viewBox="0 0 600 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e1e"/>
      <stop offset="100%" style="stop-color:#252526"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="300" fill="url(#bg)"/>
  
  <!-- Title bar -->
  <rect x="0" y="0" width="600" height="30" fill="#323233"/>
  <text x="300" y="20" fill="#cccccc" font-family="system-ui" font-size="12" text-anchor="middle">login.feature → steps.py</text>
  
  <!-- Left panel - Feature file -->
  <rect x="10" y="40" width="280" height="250" fill="#1e1e1e" rx="4"/>
  <text x="20" y="60" fill="#569cd6" font-family="monospace" font-size="11">Feature:</text>
  <text x="75" y="60" fill="#ce9178" font-family="monospace" font-size="11">User Login</text>
  
  <text x="30" y="85" fill="#569cd6" font-family="monospace" font-size="11">Scenario:</text>
  <text x="95" y="85" fill="#ce9178" font-family="monospace" font-size="11">Valid login</text>
  
  <text x="40" y="110" fill="#c586c0" font-family="monospace" font-size="11">Given</text>
  <text x="80" y="110" fill="#d4d4d4" font-family="monospace" font-size="11">I am on login page</text>
  
  <!-- Highlighted step with cursor -->
  <rect x="35" y="120" width="245" height="20" fill="#264f78" rx="2"/>
  <text x="40" y="135" fill="#c586c0" font-family="monospace" font-size="11">When</text>
  <text x="75" y="135" fill="#4ec9b0" font-family="monospace" font-size="11" text-decoration="underline">I enter "user" and "pass"</text>
  
  <text x="40" y="160" fill="#c586c0" font-family="monospace" font-size="11">Then</text>
  <text x="75" y="160" fill="#d4d4d4" font-family="monospace" font-size="11">I should see dashboard</text>
  
  <!-- Arrow -->
  <path d="M 300 130 L 310 130 L 340 130" stroke="#4ec9b0" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4ec9b0"/>
    </marker>
  </defs>
  
  <!-- Right panel - Python file -->
  <rect x="310" y="40" width="280" height="250" fill="#1e1e1e" rx="4"/>
  <text x="320" y="60" fill="#6a9955" font-family="monospace" font-size="11"># steps.py</text>
  
  <text x="320" y="85" fill="#c586c0" font-family="monospace" font-size="11">from</text>
  <text x="350" y="85" fill="#4ec9b0" font-family="monospace" font-size="11">behave</text>
  <text x="395" y="85" fill="#c586c0" font-family="monospace" font-size="11">import</text>
  <text x="440" y="85" fill="#d4d4d4" font-family="monospace" font-size="11">*</text>
  
  <!-- Highlighted definition -->
  <rect x="315" y="100" width="270" height="45" fill="#264f78" rx="2"/>
  <text x="320" y="118" fill="#dcdcaa" font-family="monospace" font-size="11">@when</text>
  <text x="355" y="118" fill="#d4d4d4" font-family="monospace" font-size="11">(</text>
  <text x="360" y="118" fill="#ce9178" font-family="monospace" font-size="11">'I enter "{user}" and "{pw}"'</text>
  <text x="540" y="118" fill="#d4d4d4" font-family="monospace" font-size="11">)</text>
  <text x="320" y="138" fill="#c586c0" font-family="monospace" font-size="11">def</text>
  <text x="345" y="138" fill="#dcdcaa" font-family="monospace" font-size="11">enter_credentials</text>
  <text x="465" y="138" fill="#d4d4d4" font-family="monospace" font-size="11">(ctx):</text>
  
  <text x="330" y="165" fill="#d4d4d4" font-family="monospace" font-size="11">...</text>
  
  <!-- Keyboard hint -->
  <rect x="200" y="260" width="200" height="25" fill="#3c3c3c" rx="4"/>
  <text x="300" y="278" fill="#cccccc" font-family="system-ui" font-size="11" text-anchor="middle">F12 / Ctrl+Click / Cmd+Click</text>
</svg>